<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DLsite Score — 分析</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#080810;--s1:#0f0f1a;--s2:#141422;--s3:#1a1a2e;
  --bd:#1e1e32;--bd2:#262640;
  --ac:#7c6dfa;--ac2:#b8adff;--ac-glow:rgba(124,109,250,.18);--ac-faint:rgba(124,109,250,.07);
  --green:#22d472;--yellow:#f5a623;--red:#f04060;
  --txt:#c8c8e8;--txt2:#8888aa;--txt3:#50507a;
  --mono:'DM Mono','Consolas',monospace;
  --head:'Syne',system-ui,sans-serif;
  --sans:system-ui,-apple-system,'Segoe UI',sans-serif;
}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

body{background:var(--bg);color:var(--txt);font-family:var(--sans);font-size:13px;min-height:100vh}

/* HEADER */
.hd{
  display:flex;align-items:center;gap:14px;
  padding:16px 24px;
  background:linear-gradient(160deg,#13132a 0%,#080810 100%);
  border-bottom:1px solid var(--bd);
  position:sticky;top:0;z-index:20;
}
.hd-logo{width:36px;height:36px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,#9c8dff,#5c4dda);
  box-shadow:0 0 16px rgba(124,109,250,.4);
  display:flex;align-items:center;justify-content:center;font-size:18px}
.hd-title{font-family:var(--head);font-size:16px;font-weight:800;color:#fff}
.hd-sub{font-family:var(--mono);font-size:10px;color:var(--txt3);letter-spacing:.1em;margin-top:2px}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--bd);padding:0 24px;background:var(--s1)}
.tab{
  font-family:var(--head);font-size:11px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  color:var(--txt3);padding:12px 18px;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:color .15s,border-color .15s;
}
.tab:hover{color:var(--txt2)}
.tab.active{color:var(--ac2);border-bottom-color:var(--ac)}

/* PANELS */
.panel{display:none;padding:24px;max-width:900px;margin:0 auto}
.panel.active{display:block}

/* EMPTY STATE */
.empty{
  text-align:center;padding:60px 20px;
  font-size:13px;color:var(--txt3);font-family:var(--mono);
}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-hint{margin-top:8px;font-size:11px;color:var(--txt3)}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.stat-card{
  background:var(--s2);border:1px solid var(--bd);border-radius:10px;
  padding:14px 16px;
}
.stat-lbl{font-size:10px;font-family:var(--mono);letter-spacing:.1em;color:var(--txt3);text-transform:uppercase;margin-bottom:6px}
.stat-val{font-family:var(--head);font-size:28px;font-weight:800;color:#fff;line-height:1}
.stat-unit{font-size:11px;color:var(--txt2);margin-top:3px;font-family:var(--mono)}

/* CHART SECTION */
.chart-section{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;margin-bottom:24px}
@media(max-width:600px){.chart-section{grid-template-columns:1fr}}

.chart-wrap{
  background:var(--s2);border:1px solid var(--bd);border-radius:10px;
  padding:20px;display:flex;flex-direction:column;align-items:center;
}
.chart-title{font-family:var(--head);font-size:11px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--txt3);margin-bottom:16px;align-self:flex-start}

canvas{border-radius:50%;display:block}

/* LEGEND */
.legend{margin-top:0;width:100%}
.legend-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 0;border-bottom:1px solid var(--bd);
  cursor:default;
}
.legend-item:last-child{border-bottom:none}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.legend-name{flex:1;font-size:12px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.legend-pct{font-family:var(--mono);font-size:11px;color:var(--txt2);flex-shrink:0}
.legend-count{font-family:var(--mono);font-size:10px;color:var(--txt3);flex-shrink:0;width:32px;text-align:right}

/* RECOMMENDED */
.section-title{
  font-family:var(--head);font-size:12px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--txt3);margin-bottom:12px;
}
.work-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.work-card{
  background:var(--s2);border:1px solid var(--bd);border-radius:8px;
  padding:12px 14px;
  transition:border-color .15s;
  text-decoration:none;display:block;
}
.work-card:hover{border-color:var(--bd2)}
.work-rj{font-family:var(--mono);font-size:10px;color:var(--ac2);margin-bottom:4px}
.work-title{font-size:12px;color:var(--txt);font-weight:600;line-height:1.4;margin-bottom:4px;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.work-circle{font-size:11px;color:var(--txt3);margin-bottom:6px}
.work-footer{display:flex;align-items:center;gap:8px}
.work-score{
  font-family:var(--mono);font-size:13px;font-weight:700;
  padding:2px 8px;border-radius:4px;
}
.work-genres{display:flex;flex-wrap:wrap;gap:4px;flex:1}
.genre-tag{
  font-size:9px;font-family:var(--mono);
  background:var(--ac-faint);border:1px solid rgba(124,109,250,.2);
  color:var(--ac2);padding:1px 5px;border-radius:3px;
}

/* SEARCH LINKS */
.search-links{margin-top:24px}
.search-links-title{font-family:var(--head);font-size:11px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--txt3);margin-bottom:10px}
.link-list{display:flex;flex-wrap:wrap;gap:8px}
.genre-link{
  font-size:11px;font-family:var(--mono);
  background:var(--s2);border:1px solid var(--bd2);border-radius:6px;
  color:var(--ac2);padding:5px 12px;
  text-decoration:none;transition:all .15s;
}
.genre-link:hover{border-color:var(--ac);box-shadow:0 0 8px var(--ac-glow)}

@media(prefers-reduced-motion:reduce){
  .tab,.work-card,.genre-link,.period-btn{transition:none!important}
}

/* CONTROLS */
.graph-controls{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.period-btns{display:flex;gap:4px;flex-wrap:wrap}
.period-btn{
  font-size:10px;font-family:var(--mono);
  background:var(--s2);border:1px solid var(--bd2);
  border-radius:4px;color:var(--txt3);padding:4px 10px;
  cursor:pointer;transition:all .15s;
}
.period-btn:hover{border-color:var(--ac);color:var(--ac2)}
.period-btn.active{background:var(--ac-faint);border-color:var(--ac);color:var(--ac2)}
.chart-toggle{
  font-size:10px;font-family:var(--mono);
  background:var(--s2);border:1px solid var(--bd2);
  border-radius:4px;color:var(--txt2);padding:4px 10px;
  cursor:pointer;transition:all .15s;margin-left:auto;
}
.chart-toggle:hover{border-color:var(--ac);color:var(--ac2)}

/* BAR CHART */
.bar-wrap{align-items:stretch}
.bar-chart{display:flex;flex-direction:column;gap:6px;width:100%}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{font-size:11px;color:var(--txt);min-width:80px;max-width:120px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.bar-track{flex:1;height:14px;background:var(--s3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .35s cubic-bezier(.4,0,.2,1)}
.bar-val{font-family:var(--mono);font-size:10px;color:var(--txt2);min-width:52px;text-align:right}
.bar-cnt{color:var(--txt3)}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-logo">📊</div>
  <div>
    <div class="hd-title">DLsite Score — 分析</div>
    <div class="hd-sub">GENRE ANALYTICS</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-panel="panel-graph">性癖グラフ</div>
  <div class="tab" data-panel="panel-rec">おすすめ作品</div>
</div>

<div class="panel active" id="panel-graph">
  <div id="graph-content">
    <div class="empty"><div class="empty-icon">📊</div>読み込み中…</div>
  </div>
</div>

<div class="panel" id="panel-rec">
  <div id="rec-content">
    <div class="empty"><div class="empty-icon">🔍</div>読み込み中…</div>
  </div>
</div>

<script src="analytics.js"></script>
</body>
</html>
